<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý học viên</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:#f7f7f5;color:#1a1a1a}
    .app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:1.75rem}
    .header-icon{width:42px;height:42px;background:#f97316;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .header-icon svg{width:22px;height:22px;fill:white}
    .header h1{font-size:20px;font-weight:700;color:#111}
    .header p{font-size:12px;color:#888;margin-top:2px}
    .tabs{display:flex;gap:2px;background:#efefed;border-radius:12px;padding:4px;margin-bottom:1.5rem;overflow-x:auto}
    .tab{padding:8px 16px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#666;border-radius:8px;white-space:nowrap;font-family:inherit;transition:all 0.15s}
    .tab.active{background:#f97316;color:white;font-weight:600;box-shadow:0 1px 6px rgba(249,115,22,0.35)}
    .tab:hover:not(.active){background:#fff;color:#111}
    .panel{display:none}.panel.active{display:block}
    .card{background:#fff;border:1px solid #ebebeb;border-radius:14px;padding:1.25rem;margin-bottom:1rem}
    .card-title{font-size:14px;font-weight:700;color:#111;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
    .card-title::before{content:'';width:3px;height:16px;background:#f97316;border-radius:2px;display:block}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .form-row.full{grid-template-columns:1fr}
    .form-row.three{grid-template-columns:1fr 1fr 1fr}
    label{display:block;font-size:11px;color:#888;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
    input,select,textarea{width:100%;padding:8px 11px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#f97316;box-shadow:0 0 0 3px rgba(249,115,22,0.12)}
    textarea{resize:vertical;min-height:70px}
    .btn{padding:8px 16px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:13px;font-family:inherit}
    .btn:hover{background:#f7f7f5}
    .btn.primary{background:#f97316;color:#fff;border-color:#f97316;font-weight:600}
    .btn.primary:hover{background:#ea6c0a}
    .btn.ghost{background:transparent;border-color:#e0e0e0}
    .btn.ghost:hover{background:#f7f7f5}
    .btn.danger{color:#dc2626;border-color:#fecaca}
    .btn.danger:hover{background:#fff5f5}
    .tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#fff7ed;border:1px solid #fed7aa;border-radius:20px;font-size:12px;color:#c2410c;margin:2px;font-weight:500}
    .tag .remove{cursor:pointer;color:#f97316;font-size:15px;line-height:1}
    .course-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;min-height:40px;padding:8px;border:1px solid #ebebeb;border-radius:8px;background:#fafafa}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#f0f0f0;border-radius:10px;overflow:hidden;margin-bottom:1rem}
    .info-cell{background:#fff;padding:12px 14px}
    .info-cell.full{grid-column:1/-1}
    .info-cell-label{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px}
    .info-cell-val{font-size:13px;color:#1a1a1a}
    .info-cell-val a{color:#f97316;text-decoration:none}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:9px 12px;border-bottom:1px solid #e8e8e8;color:#888;font-weight:600;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;background:#fafafa}
    td{padding:9px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fffbf7}
    .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;margin:1px;font-weight:500}
    .empty{text-align:center;color:#aaa;padding:2.5rem;font-size:13px}
    .alert{padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500}
    .alert.success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
    .alert.error{background:#fff5f5;color:#dc2626;border:1px solid #fecaca}
    .suggest-box{position:relative}
    .suggests{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:9px;z-index:10;max-height:160px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
    .suggest-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f5f5f5}
    .suggest-item:hover{background:#fff7ed;color:#c2410c}
    .suggest-item:last-child{border-bottom:none}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
    .stat-card{background:#fff;border:1px solid #ebebeb;border-radius:14px;padding:18px;text-align:center;position:relative;overflow:hidden}
    .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#f97316}
    .stat-num{font-size:30px;font-weight:700;color:#f97316;margin-bottom:3px}
    .stat-lbl{font-size:12px;color:#888;font-weight:500}
    #msg{position:fixed;top:1rem;right:1rem;z-index:100;min-width:240px}
    .avatar{width:40px;height:40px;border-radius:50%;background:#fff7ed;border:2px solid #fed7aa;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#f97316;flex-shrink:0}
    .hv-header{display:flex;align-items:center;gap:14px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #f0f0f0}
    .hv-name{font-size:16px;font-weight:700}
    .hv-email{font-size:12px;color:#888;margin-top:2px}
    @media(max-width:600px){
      .form-row,.form-row.three{grid-template-columns:1fr}
      .info-grid{grid-template-columns:1fr}
      .tabs{gap:1px}
      .tab{padding:7px 10px;font-size:12px}
    }
  </style>
</head>
<body>
<div class="app">
  <div id="msg"></div>
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
    </div>
    <div>
      <h1>Quản lý học viên</h1>
      <p>Hệ thống quản lý thông tin học viên và khóa học</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('nhap')">Nhập học viên</button>
    <button class="tab" onclick="switchTab('hocvien')">Tra cứu học viên</button>
    <button class="tab" onclick="switchTab('khoahoc')">Tra cứu khóa học</button>
    <button class="tab" onclick="switchTab('tonghop')">Tổng hợp</button>
    <button class="tab" onclick="switchTab('quanly')">Quản lý khóa học</button>
  </div>

  <div id="tab-nhap" class="panel active">
    <div class="card">
      <div class="card-title">Thông tin học viên</div>
      <div class="form-row">
        <div>
          <label>Email (mã học viên) *</label>
          <div class="suggest-box">
            <input id="inp-email" type="email" placeholder="email@example.com" oninput="onEmailInput()" onblur="hideSuggest()" autocomplete="off">
            <div class="suggests" id="email-suggests" style="display:none"></div>
          </div>
        </div>
        <div>
          <label>Họ tên *</label>
          <input id="inp-ten" type="text" placeholder="Nguyễn Văn A">
        </div>
      </div>
      <div class="form-row three">
        <div>
          <label>Số điện thoại</label>
          <input id="inp-sdt" type="text" placeholder="0901234567">
        </div>
        <div>
          <label>Ngày tháng năm sinh</label>
          <input id="inp-ngaysinh" type="date">
        </div>
        <div>
          <label>Link Facebook</label>
          <input id="inp-fb" type="text" placeholder="https://facebook.com/...">
        </div>
      </div>
      <div class="form-row full">
        <div>
          <label>Ghi chú</label>
          <textarea id="inp-ghichu" placeholder="Ghi chú thêm về học viên..."></textarea>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Khóa học đăng ký</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <select id="sel-course" style="flex:1"><option value="">-- Chọn khóa học --</option></select>
        <button class="btn primary" onclick="addCourseToList()">+ Thêm</button>
      </div>
      <label>Đã chọn:</label>
      <div class="course-list" id="selected-courses">
        <span style="color:#aaa;font-size:12px;padding:2px">Chưa chọn khóa học nào</span>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button class="btn ghost" onclick="clearForm()">Xóa form</button>
      <button class="btn primary" onclick="saveHocVien()">Lưu học viên</button>
    </div>
  </div>

  <div id="tab-hocvien" class="panel">
    <div class="card">
      <label>Chọn học viên</label>
      <select id="sel-hv" onchange="loadHocVienInfo()" style="max-width:420px">
        <option value="">-- Chọn học viên --</option>
      </select>
    </div>
    <div id="hv-info"></div>
  </div>

  <div id="tab-khoahoc" class="panel">
    <div class="card">
      <label>Chọn khóa học</label>
      <select id="sel-kh" onchange="loadKhoaHocInfo()" style="max-width:420px">
        <option value="">-- Chọn khóa học --</option>
      </select>
    </div>
    <div id="kh-info"></div>
  </div>

  <div id="tab-tonghop" class="panel">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="s-hv">-</div><div class="stat-lbl">Học viên</div></div>
      <div class="stat-card"><div class="stat-num" id="s-kh">-</div><div class="stat-lbl">Khóa học</div></div>
      <div class="stat-card"><div class="stat-num" id="s-dk">-</div><div class="stat-lbl">Lượt đăng ký</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div class="card-title" style="margin:0">Danh sách tổng hợp</div>
        <button class="btn primary" onclick="exportCSV()">Xuất CSV</button>
      </div>
      <div style="margin-bottom:12px">
        <input id="search-all" type="text" placeholder="Tìm kiếm học viên, khóa học, ghi chú..." oninput="filterTable()" style="max-width:340px">
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Họ tên</th><th>Email</th><th>Điện thoại</th><th>Ngày sinh</th><th>Facebook</th><th>Ghi chú</th><th>Khóa học</th></tr></thead>
          <tbody id="main-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-quanly" class="panel">
    <div class="card">
      <div class="card-title">Thêm khóa học mới</div>
      <div style="display:flex;gap:8px">
        <input id="inp-kh-ten" type="text" placeholder="Tên khóa học" style="flex:1">
        <input id="inp-kh-mo-ta" type="text" placeholder="Mô tả (tùy chọn)" style="flex:1">
        <button class="btn primary" onclick="addKhoaHoc()">+ Thêm</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Danh sách khóa học</div>
      <div id="kh-list"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL='https://gjlgpfpvfbgtsasscxvd.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqbGdwZnB2ZmJndHNhc3NjeHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDk0OTUsImV4cCI6MjA5MTAyNTQ5NX0.tcWj4xcfDvr8kV6ctSMw08LBJKjBDQ1fLJNIIRebTlo';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let allHocVien=[],allKhoaHoc=[],selectedCourseIds=[],allDangKy=[];

function showMsg(txt,type='success'){
  const el=document.getElementById('msg');
  el.innerHTML=`<div class="alert ${type}">${txt}</div>`;
  setTimeout(()=>el.innerHTML='',3500);
}
function formatDate(d){
  if(!d)return'—';
  const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;
}
function initials(name){
  return name.split(' ').slice(-2).map(w=>w[0]).join('').toUpperCase();
}
async function loadAll(){
  const[{data:hv},{data:kh},{data:dk}]=await Promise.all([
    sb.from('hoc_vien').select('*').order('ho_ten'),
    sb.from('khoa_hoc').select('*').order('ten_khoa_hoc'),
    sb.from('dang_ky').select('*')
  ]);
  allHocVien=hv||[];allKhoaHoc=kh||[];allDangKy=dk||[];
  populateSelects();
}
function populateSelects(){
  document.getElementById('sel-course').innerHTML='<option value="">-- Chọn khóa học --</option>'+allKhoaHoc.map(k=>`<option value="${k.id}">${k.ten_khoa_hoc}</option>`).join('');
  document.getElementById('sel-hv').innerHTML='<option value="">-- Chọn học viên --</option>'+allHocVien.map(h=>`<option value="${h.email}">${h.ho_ten} (${h.email})</option>`).join('');
  document.getElementById('sel-kh').innerHTML='<option value="">-- Chọn khóa học --</option>'+allKhoaHoc.map(k=>`<option value="${k.id}">${k.ten_khoa_hoc}</option>`).join('');
  renderKhList();
}
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['nhap','hocvien','khoahoc','tonghop','quanly'][i]===name);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='tonghop')loadTongHop();
}
function onEmailInput(){
  const val=document.getElementById('inp-email').value.toLowerCase();
  const box=document.getElementById('email-suggests');
  if(!val){box.style.display='none';return;}
  const matches=allHocVien.filter(h=>h.email.toLowerCase().includes(val)||h.ho_ten.toLowerCase().includes(val));
  if(!matches.length){box.style.display='none';return;}
  box.innerHTML=matches.map(h=>`<div class="suggest-item" onmousedown="fillHocVien('${h.email}')">${h.ho_ten} — ${h.email}</div>`).join('');
  box.style.display='block';
}
function hideSuggest(){setTimeout(()=>{document.getElementById('email-suggests').style.display='none';},150);}
function fillHocVien(email){
  const hv=allHocVien.find(h=>h.email===email);if(!hv)return;
  document.getElementById('inp-email').value=hv.email;
  document.getElementById('inp-ten').value=hv.ho_ten;
  document.getElementById('inp-sdt').value=hv.so_dien_thoai||'';
  document.getElementById('inp-fb').value=hv.link_facebook||'';
  document.getElementById('inp-ngaysinh').value=hv.ngay_sinh||'';
  document.getElementById('inp-ghichu').value=hv.ghi_chu||'';
  selectedCourseIds=allDangKy.filter(d=>d.email_hoc_vien===email).map(d=>d.khoa_hoc_id);
  renderSelectedCourses();
}
function addCourseToList(){
  const id=document.getElementById('sel-course').value;
  if(!id)return;
  if(selectedCourseIds.includes(id)){showMsg('Khóa học đã được thêm','error');return;}
  selectedCourseIds.push(id);renderSelectedCourses();
  document.getElementById('sel-course').value='';
}
function renderSelectedCourses(){
  const el=document.getElementById('selected-courses');
  if(!selectedCourseIds.length){el.innerHTML='<span style="color:#aaa;font-size:12px;padding:2px">Chưa chọn khóa học nào</span>';return;}
  el.innerHTML=selectedCourseIds.map(id=>{
    const kh=allKhoaHoc.find(k=>k.id===id);
    return`<span class="tag">${kh?kh.ten_khoa_hoc:id}<span class="remove" onclick="removeCourse('${id}')">×</span></span>`;
  }).join('');
}
function removeCourse(id){selectedCourseIds=selectedCourseIds.filter(x=>x!==id);renderSelectedCourses();}
async function saveHocVien(){
  const email=document.getElementById('inp-email').value.trim();
  const ten=document.getElementById('inp-ten').value.trim();
  if(!email||!ten){showMsg('Vui lòng nhập email và họ tên','error');return;}
  const{error:e1}=await sb.from('hoc_vien').upsert({
    email,ho_ten:ten,
    so_dien_thoai:document.getElementById('inp-sdt').value.trim()||null,
    link_facebook:document.getElementById('inp-fb').value.trim()||null,
    ngay_sinh:document.getElementById('inp-ngaysinh').value||null,
    ghi_chu:document.getElementById('inp-ghichu').value.trim()||null
  },{onConflict:'email'});
  if(e1){showMsg('Lỗi: '+e1.message,'error');return;}
  const existDk=allDangKy.filter(d=>d.email_hoc_vien===email).map(d=>d.khoa_hoc_id);
  const toAdd=selectedCourseIds.filter(id=>!existDk.includes(id));
  const toRemove=existDk.filter(id=>!selectedCourseIds.includes(id));
  if(toAdd.length)await sb.from('dang_ky').insert(toAdd.map(id=>({email_hoc_vien:email,khoa_hoc_id:id})));
  for(const id of toRemove)await sb.from('dang_ky').delete().eq('email_hoc_vien',email).eq('khoa_hoc_id',id);
  showMsg('Đã lưu thành công!');clearForm();await loadAll();
}
function clearForm(){
  ['inp-email','inp-ten','inp-sdt','inp-fb','inp-ngaysinh','inp-ghichu'].forEach(id=>document.getElementById(id).value='');
  selectedCourseIds=[];renderSelectedCourses();
}
function loadHocVienInfo(){
  const email=document.getElementById('sel-hv').value;
  const el=document.getElementById('hv-info');
  if(!email){el.innerHTML='';return;}
  const hv=allHocVien.find(h=>h.email===email);if(!hv){el.innerHTML='';return;}
  const courses=allDangKy.filter(d=>d.email_hoc_vien===email).map(d=>{const k=allKhoaHoc.find(k=>k.id===d.khoa_hoc_id);return k?k.ten_khoa_hoc:'?';});
  el.innerHTML=`<div class="card">
    <div class="hv-header">
      <div class="avatar">${initials(hv.ho_ten)}</div>
      <div><div class="hv-name">${hv.ho_ten}</div><div class="hv-email">${hv.email}</div></div>
    </div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-cell-label">Điện thoại</div><div class="info-cell-val">${hv.so_dien_thoai||'—'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Ngày sinh</div><div class="info-cell-val">${formatDate(hv.ngay_sinh)}</div></div>
      <div class="info-cell"><div class="info-cell-label">Facebook</div><div class="info-cell-val">${hv.link_facebook?`<a href="${hv.link_facebook}" target="_blank">${hv.link_facebook}</a>`:'—'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Số khóa học</div><div class="info-cell-val" style="color:#f97316;font-weight:700">${courses.length} khóa</div></div>
      <div class="info-cell full"><div class="info-cell-label">Ghi chú</div><div class="info-cell-val">${hv.ghi_chu||'—'}</div></div>
      <div class="info-cell full"><div class="info-cell-label">Khóa học đã học</div><div class="info-cell-val" style="margin-top:4px">${courses.length?courses.map(c=>`<span class="badge">${c}</span>`).join(' '):'Chưa đăng ký khóa học nào'}</div></div>
    </div>
  </div>`;
}
function loadKhoaHocInfo(){
  const id=document.getElementById('sel-kh').value;
  const el=document.getElementById('kh-info');
  if(!id){el.innerHTML='';return;}
  const kh=allKhoaHoc.find(k=>k.id===id);if(!kh){el.innerHTML='';return;}
  const hvList=allDangKy.filter(d=>d.khoa_hoc_id===id).map(d=>allHocVien.find(h=>h.email===d.email_hoc_vien)).filter(Boolean);
  el.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div class="card-title" style="margin:0">${kh.ten_khoa_hoc}</div>
      <span style="background:#fff7ed;color:#f97316;border:1px solid #fed7aa;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:600">${hvList.length} học viên</span>
    </div>
    ${kh.mo_ta?`<p style="color:#888;font-size:13px;margin-bottom:1rem">${kh.mo_ta}</p>`:''}
    ${hvList.length?`<div class="table-wrap"><table><thead><tr><th>Họ tên</th><th>Email</th><th>Điện thoại</th><th>Ngày sinh</th><th>Ghi chú</th></tr></thead><tbody>${hvList.map(h=>`<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:28px;height:28px;font-size:11px">${initials(h.ho_ten)}</div>${h.ho_ten}</div></td><td>${h.email}</td><td>${h.so_dien_thoai||'—'}</td><td>${formatDate(h.ngay_sinh)}</td><td>${h.ghi_chu||'—'}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">Chưa có học viên nào đăng ký khóa học này</div>'}
  </div>`;
}
let tableData=[];
async function loadTongHop(){
  document.getElementById('s-hv').textContent=allHocVien.length;
  document.getElementById('s-kh').textContent=allKhoaHoc.length;
  document.getElementById('s-dk').textContent=allDangKy.length;
  tableData=allHocVien.map(hv=>{
    const courses=allDangKy.filter(d=>d.email_hoc_vien===hv.email).map(d=>{const k=allKhoaHoc.find(k=>k.id===d.khoa_hoc_id);return k?k.ten_khoa_hoc:'?';});
    return{...hv,courses};
  });
  renderTable(tableData);
}
function renderTable(data){
  const tbody=document.getElementById('main-tbody');
  if(!data.length){tbody.innerHTML='<tr><td colspan="7"><div class="empty">Chưa có dữ liệu</div></td></tr>';return;}
  tbody.innerHTML=data.map(r=>`<tr>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:28px;height:28px;font-size:11px">${initials(r.ho_ten)}</div>${r.ho_ten}</div></td>
    <td>${r.email}</td><td>${r.so_dien_thoai||'—'}</td><td>${formatDate(r.ngay_sinh)}</td>
    <td>${r.link_facebook?`<a href="${r.link_facebook}" target="_blank" style="color:#f97316">Xem</a>`:'—'}</td>
    <td>${r.ghi_chu||'—'}</td>
    <td>${r.courses.length?r.courses.map(c=>`<span class="badge">${c}</span>`).join(' '):'—'}</td>
  </tr>`).join('');
}
function filterTable(){
  const q=document.getElementById('search-all').value.toLowerCase();
  if(!q){renderTable(tableData);return;}
  renderTable(tableData.filter(r=>r.ho_ten.toLowerCase().includes(q)||r.email.toLowerCase().includes(q)||(r.ghi_chu||'').toLowerCase().includes(q)||r.courses.some(c=>c.toLowerCase().includes(q))));
}
function exportCSV(){
  if(!tableData.length)return;
  const rows=[['Họ tên','Email','Điện thoại','Ngày sinh','Facebook','Ghi chú','Khóa học'],...tableData.map(r=>[r.ho_ten,r.email,r.so_dien_thoai||'',formatDate(r.ngay_sinh),r.link_facebook||'',r.ghi_chu||'',r.courses.join('; ')])];
  const csv=rows.map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hoc_vien.csv';a.click();
}
async function addKhoaHoc(){
  const ten=document.getElementById('inp-kh-ten').value.trim();
  const mo_ta=document.getElementById('inp-kh-mo-ta').value.trim();
  if(!ten){showMsg('Vui lòng nhập tên khóa học','error');return;}
  const{error}=await sb.from('khoa_hoc').insert({ten_khoa_hoc:ten,mo_ta:mo_ta||null});
  if(error){showMsg('Lỗi: '+error.message,'error');return;}
  document.getElementById('inp-kh-ten').value='';
  document.getElementById('inp-kh-mo-ta').value='';
  showMsg('Đã thêm khóa học!');await loadAll();
}
async function deleteKhoaHoc(id){
  if(!confirm('Xóa khóa học này? Tất cả đăng ký liên quan cũng sẽ bị xóa.'))return;
  const{error}=await sb.from('khoa_hoc').delete().eq('id',id);
  if(error){showMsg('Lỗi: '+error.message,'error');return;}
  showMsg('Đã xóa khóa học');await loadAll();
}
function renderKhList(){
  const el=document.getElementById('kh-list');if(!el)return;
  if(!allKhoaHoc.length){el.innerHTML='<div class="empty">Chưa có khóa học nào</div>';return;}
  el.innerHTML=`<table><thead><tr><th>Tên khóa học</th><th>Mô tả</th><th>Số HV</th><th></th></tr></thead><tbody>${allKhoaHoc.map(k=>{
    const cnt=allDangKy.filter(d=>d.khoa_hoc_id===k.id).length;
    return`<tr><td style="font-weight:600">${k.ten_khoa_hoc}</td><td>${k.mo_ta||'—'}</td><td><span style="color:#f97316;font-weight:700">${cnt}</span></td><td><button class="btn danger" onclick="deleteKhoaHoc('${k.id}')">Xóa</button></td></tr>`;
  }).join('')}</tbody></table>`;
}
loadAll();
</script>
</body>
</html>
